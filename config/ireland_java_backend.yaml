  strategy_weight: 0.20
  preferred_titles:
    - Java Developer
    - Java Backend Engineer
    - Software Engineer Java
    - Backend Software Engineer
    - Platform Engineer
  preferred_technologies:
    - Java
    - Spring Boot
    - microservices
    - Kafka
    - REST
    - cloud
    - AWS
    - Kubernetes
    - PostgreSQL
  preferred_domains:
    - SaaS
    - fintech
    - payments
    - cloud
    - platform
    - ecommerce
    - backend
  demand_signals:
    - critical skills
    - sponsorship
    - visa sponsorship
    - hybrid
    - permanent
    - English
  risk_terms:
    - Stamp 4 required
    - EU work permit required
    - frontend

