scoring_weights:
  language_requirement: 0.08
  visa_sponsorship: 0.16
  seniority: 0.08
  technical_skills: 0.43
  domain_experience: 0.25

filters:
  exclude_student_jobs: true
  exclude_3rd_party: true
  min_score_threshold: 55

language_preferences:
  preferred: [English]
  acceptable: [English]
  hard_block: []

