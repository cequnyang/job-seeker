scoring_weights:
  language_requirement: 0.13
  visa_sponsorship: 0.12
  seniority: 0.08
  technical_skills: 0.42
  domain_experience: 0.25

filters:
  exclude_student_jobs: true
  exclude_3rd_party: true
  min_score_threshold: 55

language_preferences:
  preferred: [English, German]
  acceptable: [English]
  hard_block: [German B2+ required]

market_strategy:
  objective: maximize_offer_probability
  positioning: C++ / Qt / Linux engineer for industrial HMI, diagnostics, SDK integration, and engineering tools
