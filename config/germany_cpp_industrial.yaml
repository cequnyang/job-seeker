  strategy_weight: 0.22
  preferred_titles:
    - C++ Qt Engineer
    - C++ Software Engineer
    - Qt Developer
    - HMI Developer
    - Diagnostics Engineer
    - Industrial Software Engineer
  preferred_technologies:
